<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <title>Exam Registration System</title>
    <link rel="stylesheet" href="exam_system_stylesheet.css">
</head>

<body>
    <div class="container">
        <h1 class="title">Welcome to your CSN Exams Registration Portal!</h1>

        <div class="login">
            <form action="/login" method="POST">
                <label for="email">NSHE Email:</label>
                <input type="email" id="email" name="email" required>

                <label for="password">Password:</label>
                <input type="password" id="password" name="password" required>

                <button type="submit">Login</button>
            </form>

            <p class="create-account">
                Don't have an account?
                <a href="account_creation.html">Register here!</a>
            </p>
        </div>
    </div>
</body>
</html>
